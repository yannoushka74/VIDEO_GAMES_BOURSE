apiVersion: apps/v1
kind: Deployment
metadata:
  name: vgb-frontend
  namespace: videogames
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vgb-frontend
  template:
    metadata:
      labels:
        app: vgb-frontend
    spec:
      containers:
      - name: frontend
        image: vgb-frontend:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: vgb-frontend
  namespace: videogames
spec:
  selector:
    app: vgb-frontend
  ports:
  - port: 80
    targetPort: 80
